{% if site.gh_edit_link and page.path %}
  <a
    class="edit-page-link"
    href="{{ site.gh_edit_repository }}/{{ site.gh_edit_view_mode | default: 'edit' }}/{{ site.gh_edit_branch | default: 'main' }}/{{ page.path }}"
    target="_blank"
    rel="noopener noreferrer"
  >
    <span class="icon icon-github"></span>
    {{ site.gh_edit_link_text | default: "Edit this page on GitHub – help us improve this user guide" }}
  </a>
{% endif %}
